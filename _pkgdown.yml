url: https://belian-earth.github.io/spacelaser/
development:
  mode: auto
template:
  bootstrap: 5
  bootswatch: cosmo
  bslib:
    primary: '#74ac90ff'
  math-rendering: mathjax
navbar:
  structure:
    left:
    - reference
    - intro
    - articles
    - news
    right:
    - search
    - github
  components:
    github:
      icon: fa-github
      href: https://github.com/belian-earth/spacelaser
reference:
- title: Search
  desc: Find GEDI and ICESat-2 granules via NASA CMR.
  contents:
  - sl_search
  - sl_bbox
- title: Read
  desc: Pull spatial subsets from remote HDF5 granules.
  contents:
  - sl_read
- title: Columns
  desc: Inspect the curated column registry for each product.
  contents:
  - sl_columns
- title: Waveforms
  desc: Post-processing helpers for GEDI L1B waveform data.
  contents:
  - sl_extract_waveforms
- title: Low-level HDF5
  desc: Explore arbitrary datasets in a remote HDF5 file.
  contents:
  - sl_hdf5_groups
  - sl_hdf5_read
